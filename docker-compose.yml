# Docker Compose - Sistema de Votacao Distribuido (local)
# Deploy: docker compose up -d

services:
  # NameServer - Service Discovery (local)
  nameserver:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: >
      python nameserver.py
        --port 9000
        --http-port 9080
    ports:
      - "9000:9000"   # TCP (clientes iOS)
      - "9080:9080"   # HTTP API (clientes web)
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9080/health', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Tally Server S1
  s1:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: >
      python tally_server.py
        --id s1
        --port 8001
        --http-port 9001
        --peers "s2:s2:8002,s3:s3:8003"
        --nameserver-host nameserver
        --nameserver-port 9000
        --advertised-host localhost
    ports:
      - "8001:8001"   # TCP
      - "9001:9001"   # HTTP
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - nameserver
    restart: unless-stopped

  # Tally Server S2
  s2:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: >
      python tally_server.py
        --id s2
        --port 8002
        --http-port 9002
        --peers "s1:s1:8001,s3:s3:8003"
        --nameserver-host nameserver
        --nameserver-port 9000
        --advertised-host localhost
    ports:
      - "8002:8002"   # TCP
      - "9002:9002"   # HTTP
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - nameserver
    restart: unless-stopped

  # Tally Server S3 (sera o lider - maior ID)
  s3:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: >
      python tally_server.py
        --id s3
        --port 8003
        --http-port 9003
        --peers "s1:s1:8001,s2:s2:8002"
        --nameserver-host nameserver
        --nameserver-port 9000
        --advertised-host localhost
    ports:
      - "8003:8003"   # TCP
      - "9003:9003"   # HTTP
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - nameserver
    restart: unless-stopped

  # Web Dashboard (local)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_NAMESERVER_URL: http://localhost:9080
    ports:
      - "3000:3000"
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_NAMESERVER_URL=http://localhost:9080
    depends_on:
      - nameserver
    restart: unless-stopped
