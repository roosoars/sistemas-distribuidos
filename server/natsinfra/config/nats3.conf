server_name: "nats-3"
port: 4222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
}

cluster {
  name: "vote-nats"
  listen: "0.0.0.0:6222"
  routes = [
    "nats://nats-1:6222",
    "nats://nats-2:6222"
  ]
}

websocket {
  port: 9222
  no_tls: true
  same_origin: false
  allowed_origins [
    "http://localhost:3000"
  ]
}

include "./auth.conf"
